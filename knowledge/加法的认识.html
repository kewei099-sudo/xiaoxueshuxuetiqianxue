<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加法的认识</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #e3f2fd 0%, #ffffff 100%);
            border-radius: 24px;
            margin-bottom: 30px;
        }
        h1 { color: #2196f3; margin: 0; font-size: 28px; }
        .example-box {
            background: #f5f5f5;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin: 30px 0;
            font-size: 32px;
            font-weight: bold;
            color: #2196f3;
        }
        .plus-sign { color: #ff5722; margin: 0 15px; }
        .equal-sign { color: #4caf50; margin: 0 15px; }
        .illustration {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .item { font-size: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>加法的认识</h1>
        <p>把两部分合在一起，就是加法！</p>
    </div>
    <div class="content">
        <h3>什么是加法？</h3>
        <p>加法是基本的四则运算之一，表达的是“合起来”的意思。</p>
        
        <div class="illustration">
            <div class="item">🍎🍎</div>
            <div class="plus-sign">+</div>
            <div class="item">🍎</div>
            <div class="equal-sign">=</div>
            <div class="item">🍎🍎🍎</div>
        </div>

        <div class="example-box">
            2 <span class="plus-sign">+</span> 1 <span class="equal-sign">=</span> 3
        </div>

        <p>在这个算式中：</p>
        <ul>
            <li><strong>+</strong> 是加号，读作“加”。</li>
            <li><strong>=</strong> 是等号，读作“等于”。</li>
            <li>2 和 1 是加数，3 是它们的<strong>和</strong>。</li>
        </ul>
    </div>
</body>
</html>
