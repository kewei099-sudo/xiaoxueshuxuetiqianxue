<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识厘米</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fff3e0 0%, #ffffff 100%);
            border-radius: 24px;
            margin-bottom: 30px;
        }
        h1 { color: #ff9800; margin: 0; font-size: 28px; }
        .ruler {
            width: 100%;
            height: 80px;
            background: #eee;
            border: 2px solid #ccc;
            position: relative;
            margin: 40px 0;
            border-radius: 4px;
        }
        .mark {
            position: absolute;
            bottom: 0;
            width: 2px;
            background: #333;
        }
        .cm-mark { height: 30px; }
        .mm-mark { height: 15px; }
        .label {
            position: absolute;
            bottom: 35px;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>认识厘米 (cm)</h1>
        <p>量一量，看看到底有多长？</p>
    </div>
    <div class="content">
        <p>厘米是一个常用的长度单位，通常用来测量比较短的物体。它的英文缩写是 <strong>cm</strong>。</p>
        
        <div class="ruler">
            <!-- Simplified Ruler Visualization -->
            <div class="mark cm-mark" style="left: 10%"><span class="label">0</span></div>
            <div class="mark mm-mark" style="left: 14%"></div>
            <div class="mark mm-mark" style="left: 18%"></div>
            <div class="mark mm-mark" style="left: 22%"></div>
            <div class="mark mm-mark" style="left: 26%"></div>
            <div class="mark cm-mark" style="left: 30%"><span class="label">1</span></div>
            <div class="mark mm-mark" style="left: 34%"></div>
            <div class="mark mm-mark" style="left: 38%"></div>
            <div class="mark mm-mark" style="left: 42%"></div>
            <div class="mark mm-mark" style="left: 46%"></div>
            <div class="mark cm-mark" style="left: 50%"><span class="label">2</span></div>
            <div class="mark mm-mark" style="left: 54%"></div>
            <div class="mark mm-mark" style="left: 58%"></div>
            <div class="mark mm-mark" style="left: 62%"></div>
            <div class="mark mm-mark" style="left: 66%"></div>
            <div class="mark cm-mark" style="left: 70%"><span class="label">3</span></div>
            <div class="mark mm-mark" style="left: 74%"></div>
            <div class="mark mm-mark" style="left: 78%"></div>
            <div class="mark mm-mark" style="left: 82%"></div>
            <div class="mark mm-mark" style="left: 86%"></div>
            <div class="mark cm-mark" style="left: 90%"><span class="label">4</span></div>
        </div>

        <h3>生活中的 1 厘米：</h3>
        <ul>
            <li>食指的宽度大约是 1 厘米。</li>
            <li>田字格本的一个小格宽度大约是 1 厘米。</li>
            <li>一颗图钉的长度大约是 1 厘米。</li>
        </ul>
    </div>
</body>
</html>
